name: Monitor Nif-Finder compute Space

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-nif-finder-compute-space
  cancel-in-progress: false

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    env:
      HF_SPACE_ID: kazumaxneo/nif-finder-compute
      HEALTH_URL: https://kazumaxneo-nif-finder-compute.hf.space/health
    steps:
      - name: Check compute health and restart if needed
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          health_url = os.environ["HEALTH_URL"]
          space_id = os.environ["HF_SPACE_ID"]
          token = os.environ.get("HF_TOKEN")

          def check_health():
              try:
                  request = urllib.request.Request(
                      health_url,
                      headers={"accept": "application/json"},
                      method="GET",
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8", "replace")
                      if response.status != 200:
                          return False, f"HTTP {response.status}: {body[:300]}"
                      try:
                          payload = json.loads(body)
                      except json.JSONDecodeError:
                          return False, f"HTTP 200 but invalid JSON: {body[:300]}"
                      if payload.get("status") != "ok":
                          return False, f"Unexpected health payload: {payload}"
                      return True, "healthy"
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", "replace")
                  return False, f"HTTP {error.code}: {body[:300]}"
              except Exception as error:
                  return False, f"{type(error).__name__}: {error}"

          last_reason = "not checked"
          for attempt in range(1, 4):
              ok, reason = check_health()
              print(f"Attempt {attempt}: {reason}")
              if ok:
                  sys.exit(0)
              last_reason = reason
              if attempt < 3:
                  time.sleep(30)

          if not token:
              print("Health check failed, but GitHub secret HF_TOKEN is not set.")
              print("Add a Hugging Face token with permission to restart the Space as repository secret HF_TOKEN.")
              sys.exit(1)

          api_url = f"https://huggingface.co/api/spaces/{space_id}/restart"
          request = urllib.request.Request(
              api_url,
              data=b"{}",
              headers={
                  "authorization": f"Bearer {token}",
                  "content-type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read().decode("utf-8", "replace")
                  print(f"Restart requested for {space_id} after failed health check: {last_reason}")
                  print(f"Restart API response HTTP {response.status}: {body[:500]}")
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", "replace")
              print(f"Restart API failed HTTP {error.code}: {body[:500]}")
              sys.exit(1)
          PY
